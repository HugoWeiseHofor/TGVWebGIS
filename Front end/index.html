<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geo Data Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 400px;
        }

        img {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        a {
            text-decoration: none;
        }

        .btn {
            background-color: #2c3e50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s ease;
            display: block;
        }

        .btn:hover {
            background-color: #34495e;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Logo -->
        <img src="Billeder/HOFOR_Logo_Positiv.svg" alt="Logo">

        <!-- Title -->
        <h1>HOFOR title</h1>

        <!-- Buttons -->
        <div class="button-grid">
            <a href="Albertslund (TEST)/index.html"><div class="btn">Albertslund</div></a>
            <a href="pages/page2.html"><div class="btn">Dragør</div></a>
            <a href="pages/page3.html"><div class="btn">Brøndby</div></a>
            <a href="pages/page4.html"><div class="btn">København</div></a>
            <a href="pages/page5.html"><div class="btn">Rødovre</div></a>
            <a href="pages/page6.html"><div class="btn">Hvidovre</div></a>
            <a href="pages/page7.html"><div class="btn">Herlev</div></a>
            <a href="pages/page8.html"><div class="btn">Vallensbæk</div></a>
        </div>
    </div>

</body>
</html>
